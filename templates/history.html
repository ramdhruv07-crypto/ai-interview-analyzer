<!DOCTYPE html>
<html>
<head>
<title>Interview History</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#0f172a;
    color:white;
}

.container{
    width:90%;
    margin:auto;
    padding:40px;
}

h1{
    text-align:center;
    margin-bottom:30px;
}

table{
    width:100%;
    border-collapse:collapse;
    background:#1e293b;
    border-radius:10px;
    overflow:hidden;
}

th{
    background:#2563eb;
    color:white;
    padding:15px;
}

td{
    padding:15px;
    text-align:center;
    border-bottom:1px solid #334155;
}

tr:hover{
    background:#334155;
}

</style>

</head>
<body>

<div class="container">

<h1>📜 Interview History</h1>

<table>
<form method="POST" action="/login">
    <input type="email" name="email" required>
    <input type="password" name="password" required>

    <button type="submit">Login</button>
</form>
<tr>
<th>ID</th>
<th>Subject</th>
<th>Score</th>
<th>Percentage</th>
</tr>

{% for row in results %}

<tr>
<td>{{ row[0] }}</td>
<td>{{ row[1] }}</td>
<td>{{ row[2] }}</td>
<td>{{ row[3] }}%</td>
</tr>

{% endfor %}

</table>

</div>

</body>
</html>
