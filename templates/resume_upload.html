<!DOCTYPE html>
<html>
<head>
    <title>Resume Analyzer</title>
</head>
<body>

<h1>📄 AI Resume Analyzer</h1>

<form action="/resume-analyzer"
      method="POST"
      enctype="multipart/form-data">

    <input
        type="file"
        name="resume"
        accept=".pdf,.docx"
        required>

    <br><br>

    <button type="submit">
        Analyze Resume
    </button>

</form>

</body>
</html>
